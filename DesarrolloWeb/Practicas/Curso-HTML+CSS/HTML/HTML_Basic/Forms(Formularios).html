<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="text" required minlength="10"> <!--required para obligar al usuario a completar el campo-->
        <!--minlength para obligar al usuario a ingresar datos validos como el nombre completo o su nombre y no ingrese solo letras al azar-->
        <input type="email" name="Correo electronico"> <!--forma de identificar campos (inputs) si se quiere acceder a lo que el usuario escriba o ingrese-->
        <input type="password" placeholder="Escribe tu contraseña"> <!--Texto dentro de los inputs-->
        <input type="checkbox">
        <input type="radio">
        <input type="submit">
        <input type="file">
        <input type="date">
    </form>
</body>
</html>
