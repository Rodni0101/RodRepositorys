<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica</title>
</head>

<body>
    <header><h1>Hola y bienvenidos</h1></header>

    <h3>Prueba de logica</h3>
    <h4>Ingresa tu nombre: </h4>

    <input type ="text" id="nombre" onkeydown="verificarEnter(event)"> 
    <button onclick="saludar()">saludar</button>
    
    <p id="resultado"></p>

    <script>
        function saludar(){
            let nombre = document.getElementById("nombre").value;
            document.getElementById("resultado").textContent = "Hola " + nombre;
        }

        function verificarEnter(event) {
            if (event.key === "Enter") {
                saludar();
            }
        }
    </script> 

    <h1>¿Estas haciendo FRONTEND BASICO?</h1>
    <img src="./fotos/4k39g9.jpg" alt="">
</body>
</html >
